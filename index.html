<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Check-In Bot: Map</title>

    <!-- Скрипт Telegram WebApp -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <!-- Подключаем Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

    <!-- Подключаем Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Библиотека для отображения 3D-моделей .glb/.gltf -->
    <script type="module" src="https://unpkg.com/@google/model-viewer@3.4.0/dist/model-viewer.min.js"></script>

    <!-- Подключаем внешние стили -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<!-- Roblox-стиль поп-ап окна, который изначально скрыт (display: none) -->
<div id="meme-popup">
    <h3>🚨 ОБНАРУЖЕН MEME!</h3>

    <!-- Тег от Google, который теперь берет модель локально с вашего Mac -->
    <model-viewer
            id="meme-viewer"
            src="./models/Astronaut.glb"
            alt="Roblox Six-Seven Meme"
            auto-rotate
            camera-controls
            ar
            ar-modes="webxr scene-viewer quick-look"
            environment-image="neutral"
            shadow-intensity="1"
            style="width: 100%; height: 220px; background: #2a2a30;">
    </model-viewer>

    <button id="capture-btn">ТАПНУТЬ И СОБРАТЬ! 🤌</button>
</div>

<!-- Индикатор прогресса -->
<div id="progress-indicator">
    Собрано: <span id="collected-count">0</span> из <span id="total-count">0</span>
</div>

<!-- Уведомления -->
<div id="notification-container"></div>

<div id="map"></div>

<!-- Подключаем внешний JavaScript -->
<script src="script.js"></script>
</body>
</html>
