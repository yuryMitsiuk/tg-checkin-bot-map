<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Check-In Bot: Map</title>

    <!-- Скрипт Telegram WebApp -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <!-- Подключаем Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

    <!-- Подключаем Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Библиотека для отображения 3D-моделей .glb/.gltf -->
    <script type="module" src="https://unpkg.com/@google/model-viewer@3.4.0/dist/model-viewer.min.js"></script>

    <!-- Подключаем внешние стили -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<!-- Индикатор прогресса -->
<div id="progress-indicator">
    Собрано: <span id="collected-count">0</span> из <span id="total-count">0</span>
</div>

<!-- Уведомления -->
<div id="notification-container"></div>

<div id="map"></div>

<!-- Подключаем внешний JavaScript -->
<script src="script.js"></script>

<!-- AR Popup Window (Вставь это в конец body) -->
<div id="ar-popup" style="
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.95); z-index: 3000;
    display: none; flex-direction: column; align-items: center; justify-content: center;">
    <h2 style="color: white; margin-bottom: 10px;">📸 НАЙДИ МЕМА!</h2>

    <model-viewer
            id="ar-model-viewer"
            src=""
            alt="3D Meme"
            ar
            ar-modes="webxr scene-viewer quick-look"
            camera-controls
            auto-rotate
            shadow-intensity="1"
            style="width: 100%; height: 70%; background: transparent;">
        <button slot="ar-button" style="
            background-color: #ff3d00; border-radius: 4px; border: none; color: white;
            padding: 16px 32px; position: absolute; bottom: 20%; left: 50%;
            transform: translateX(-50%); font-weight: bold; cursor: pointer;">
            🚀 ЗАПУСТИТЬ AR
        </button>
    </model-viewer>

    <button id="ar-capture-btn" style="
        background: #00c853; color: white; border: none; padding: 15px 30px;
        font-size: 18px; font-weight: bold; border-radius: 50px;
        cursor: pointer; margin-top: 20px; display: none;">
        🎯 ЗАБРАТЬ!
    </button>

    <button id="ar-close-btn" style="
        position: absolute; top: 20px; right: 20px;
        background: rgba(255,255,255,0.2); color: white; border: none;
        padding: 10px 20px; border-radius: 20px; cursor: pointer;">
        ✕
    </button>
</div>
</body>
</html>
