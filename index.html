<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Check-In Bot: Map</title>

    <!-- Скрипт Telegram WebApp -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <!-- Подключаем Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

    <!-- Подключаем Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Библиотека для отображения 3D-моделей .glb/.gltf -->
    <script type="module" src="https://unpkg.com/@google/model-viewer@3.4.0/dist/model-viewer.min.js"></script>

    <!-- Подключаем внешние стили -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<!-- Индикатор прогресса -->
<div id="progress-indicator">
    Собрано: <span id="collected-count">0</span> из <span id="total-count">0</span>
</div>

<!-- Уведомления -->
<div id="notification-container"></div>

<div id="map"></div>

<!-- Подключаем внешний JavaScript -->
<script src="script.js"></script>

<!-- Стартовое меню выбора квестов (Игровой Хаб) -->
<div id="game-hub-overlay">
    <div class="hub-header">
        <h1>🤌 MEME QUESTS</h1>
        <p>Выберите доступное соревнование из списка ниже:</p>
    </div>

    <!-- Сюда JavaScript динамически вставит кнопки с играми -->
    <div id="hub-games-list">
        <p class="hub-loading-text">Загрузка доступных миров...</p>
    </div>
</div>


<!-- AR Popup Window -->
<div id="ar-popup">
    <h2>📸 НАЙДИ МЕМА!</h2>

    <model-viewer
            id="ar-model-viewer"
            src=""
            alt="3D Meme"
            ar
            ar-modes="webxr scene-viewer quick-look"
            camera-controls
            auto-rotate
            shadow-intensity="1">
        <button slot="ar-button" id="ar-launch-btn">
            🚀 ЗАПУСТИТЬ AR
        </button>
    </model-viewer>

    <button id="ar-capture-btn">
        🎯 ЗАБРАТЬ!
    </button>

    <button id="ar-close-btn">
        ✕
    </button>
</div>
</body>
</html>
